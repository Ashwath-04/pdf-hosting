<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>PDF Viewer</title>

  <link rel="stylesheet" href="style.css">

  <!-- v4.0.379 has no pdf.min.js on cdnjs (404); v3.11 works with classic script tags -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<header>
  <h1>PDF Viewer</h1>
</header>

<div style="padding:20px">

  <a href="index.html" class="btn">← Library</a>

  <a id="downloadBtn"
     class="btn btn-download">
     Download PDF
  </a>

</div>

<div id="viewer" class="viewer-container"></div>
<p id="status" style="text-align:center;color:#6b7280;padding:20px"></p>

<script>

// Required for PDF.js 4.x — without this, in-browser view stays blank
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function getPdfFileFromUrl() {
  const fromQuery = new URLSearchParams(window.location.search).get('file');
  if (fromQuery) return fromQuery;

  // Fallback when cleanUrls redirect drops ?file= (Vercel /viewer)
  const fromStorage = sessionStorage.getItem('pdfToView');
  if (fromStorage) {
    sessionStorage.removeItem('pdfToView');
    return fromStorage;
  }

  if (window.location.hash.length > 1) {
    return decodeURIComponent(window.location.hash.slice(1));
  }

  return null;
}

const pdfFile = getPdfFileFromUrl();
const statusEl = document.getElementById('status');
const viewerEl = document.getElementById('viewer');

if (!pdfFile) {
  statusEl.textContent = 'No PDF file specified. Go back to the home page and click View on a document.';
} else if (window.location.protocol === 'file:') {
  statusEl.textContent =
    'Open this site through a local server (e.g. vercel dev or npx serve), not by double-clicking index.html.';
  document.getElementById('downloadBtn').href = pdfFile;
} else {
  document.getElementById('downloadBtn').href = pdfFile;
  statusEl.textContent = 'Loading PDF…';

  pdfjsLib.getDocument(pdfFile).promise.then(async pdf => {
    statusEl.textContent = '';

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);
      const scale = 1.5;
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      viewerEl.appendChild(canvas);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }
  }).catch(err => {
    console.error(err);
    statusEl.textContent =
      'Could not load PDF in the viewer. Try Download, or run the app with: npx serve .';
  });
}

</script>

</body>
</html>
